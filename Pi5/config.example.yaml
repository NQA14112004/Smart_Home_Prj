# Copy to Pi5/config.yaml. Holds NON-SECRET layout/tuning only.
# Secrets (DATABASE_URL, MQTT_USERNAME, MQTT_PASSWORD) live in .env.

log_level: INFO

mqtt:
  host: 127.0.0.1          # on the Pi, the broker is local
  port: 8883               # TLS listener (use 1883 only while testing without TLS)
  use_tls: true
  ca_cert: /etc/mosquitto/certs/ca.crt   # self-signed CA generated by scripts/gen_certs.sh
  client_id: smarthome-bridge
  keepalive: 30
  status_topic: smarthome/status/bridge/online

nodes:
  door_code: esp32-door
  home_code: esp32-home
  face_code: rpi5-face
  auto_create: true        # create an esp_nodes row on first message from an unknown node
  presence_topic: "smarthome/status/{node}/online"
  heartbeat_interval_seconds: 30
  missed_heartbeats_before_offline: 3
  watched:
    - esp32-door
    - esp32-home
    - rpi5-face

alerts:
  gas_threshold: 400       # gas_value >= this -> level "critical", otherwise "warning"
