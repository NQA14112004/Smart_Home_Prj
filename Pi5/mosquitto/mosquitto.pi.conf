# Smart Home - Mosquitto config for the Raspberry Pi 5 hub.
# Install to: /etc/mosquitto/conf.d/smarthome.conf  then: sudo systemctl restart mosquitto
#
# This replaces the dev-only infra/broker-setup/auth.conf (which bound to 127.0.0.1).
# Here we require auth AND TLS, and listen on the LAN so ESP32 nodes can connect.

per_listener_settings true

# --- TLS listener for LAN clients (ESP32 nodes, WPF app, bridge) ----------
listener 8883
allow_anonymous false
password_file /etc/mosquitto/passwd
cafile   /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile  /etc/mosquitto/certs/server.key
tls_version tlsv1.2

# Optional: keep a localhost-only plaintext listener for quick local debugging.
# Comment this out in production if you do not need it.
listener 1883 127.0.0.1
allow_anonymous false
password_file /etc/mosquitto/passwd

# Persist retained messages / sessions across restarts.
persistence true
persistence_location /var/lib/mosquitto/

log_dest file /var/log/mosquitto/mosquitto.log
log_type warning
log_type error
log_type notice
